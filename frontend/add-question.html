<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Thêm câu hỏi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button class="back-btn" onclick="window.location.href='subject.html'">←</button>
            <h1>➕ Thêm câu hỏi</h1>
        </div>

        <div class="card">
            <div class="form-group">
                <label>📋 Paste câu hỏi và đáp án vào đây</label>
                <textarea id="rawText" placeholder="Ví dụ:
Câu 1: Thủ đô của Việt Nam là gì?
A) Hồ Chí Minh
B) Hà Nội
C) Đà Nẵng
D) Huế"></textarea>
            </div>

            <div class="form-group">
                <label>✅ Đáp án đúng</label>
                <select id="correctAnswer">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveQuestion()">💾 Lưu câu hỏi</button>
            </div>
        </div>

        <!-- Hiện ra sau khi lưu thành công -->
        <div id="successBox" class="card" style="display:none; text-align:center">
            <p style="font-size:1.2rem; color:#27ae60; margin-bottom:16px">
                ✅ Đã lưu câu hỏi thành công!
            </p>
            <div class="btn-group" style="justify-content:center">
                <button class="btn btn-primary" onclick="addMore()">➕ Thêm câu tiếp</button>
                <button class="btn btn-success" onclick="window.location.href='subject.html'">
                    🔙 Quay về môn học
                </button>
            </div>
        </div>
    </div>

    <script>
        // Chặn user thường
const role = localStorage.getItem('quiz_role');
if (role !== 'admin') {
    alert('Bạn không có quyền truy cập trang này!');
    window.location.href = 'subject.html';
}
        const API = window.location.hostname === 'localhost' 
    ? 'http://localhost:8080/api' 
    : 'https://quiz-app-7ch0.onrender.com/api';
        const subjectId = localStorage.getItem('subjectId');

        async function saveQuestion() {
            const rawText = document.getElementById('rawText').value.trim();
            const correctAnswer = document.getElementById('correctAnswer').value;

            if (!rawText) {
                alert('Vui lòng nhập câu hỏi!');
                return;
            }

            const res = await fetch(`${API}/questions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subjectId, rawText, correctAnswer })
            });

            if (res.ok) {
                document.getElementById('rawText').value = '';
                document.getElementById('correctAnswer').value = 'A';
                document.getElementById('successBox').style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else {
                alert('Có lỗi xảy ra, vui lòng thử lại!');
            }
        }

        function addMore() {
            document.getElementById('successBox').style.display = 'none';
            document.getElementById('rawText').focus();
        }
    </script>
</body>
</html>
