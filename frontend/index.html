<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Trang chủ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .role-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }
        .role-screen h2 {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 8px;
        }
        .role-btn {
            width: 260px;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-btn:hover { transform: translateY(-2px); }
        .role-user {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.35);
        }
        .role-user:hover { background: rgba(99,102,241,0.25); }
        .role-admin {
            background: rgba(15,23,42,0.8);
            color: #94a3b8;
            border: 1px solid rgba(100,116,139,0.3);
        }
        .role-admin:hover { background: rgba(30,41,59,0.8); }
        .pass-box {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }
        .pass-box input {
            padding: 10px 16px;
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 8px;
            font-size: 1rem;
            width: 200px;
            text-align: center;
            letter-spacing: 6px;
            background: rgba(15,23,42,0.8);
            color: #e2e8f0;
        }
        .pass-box input:focus { outline: none; border-color: #6366f1; }
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .badge-user {
            background: rgba(99,102,241,0.1);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.3);
        }
        .badge-admin {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.4);
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Màn hình chọn role -->
        <div id="roleScreen" class="role-screen" style="display:none">
            <h1>📚 Quiz App</h1>
            <p class="subtitle">Bạn vào với tư cách nào?</p>
            <button class="role-btn role-user" onclick="enterAsUser()">👤 User — Làm bài</button>
            <button class="role-btn role-admin" onclick="showPassBox()">🔐 Admin — Quản lý</button>
            <div class="pass-box" id="passBox">
                <input type="password" id="adminPass" placeholder="Mật khẩu" maxlength="10"
                    onkeydown="if(event.key==='Enter') checkPass()" />
                <button class="btn btn-primary" onclick="checkPass()">Xác nhận</button>
                <p id="passError" style="color:#f87171; font-size:13px; display:none">Sai mật khẩu!</p>
            </div>
        </div>

        <!-- Màn hình chính -->
        <div id="mainScreen" style="display:none">
            <div class="topbar">
                <div class="app-title">
                    <h1 style="text-align:left; margin:0; font-size:1.5rem">📚 Quiz App</h1>
                </div>
                <span id="roleBadge" class="role-badge"></span>
            </div>

            <div id="subjectList" class="subject-list"></div>

            <div id="emptyState" class="empty-state" style="display:none">
                <div class="icon">📖</div>
                <p>Chưa có môn học nào. Hãy thêm môn học đầu tiên!</p>
            </div>

            <div style="text-align:center; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:8px">
                <button class="btn btn-warning" onclick="goToNoteQuiz()">📌 Làm câu đã note</button>
                <button class="btn btn-primary" id="btnAddSubject" style="display:none" onclick="openModal()">+ Thêm môn học</button>
            </div>
        </div>
    </div>

    <!-- Modal thêm môn học -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>📝 Thêm môn học</h2>
            <div class="form-group">
                <label>Tên môn học</label>
                <input type="text" id="subjectName" placeholder="Ví dụ: Toán, Lý, Hóa..." />
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="addSubject()">Lưu</button>
                <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const API = window.location.hostname === 'localhost'
            ? 'http://localhost:8080/api'
            : 'https://quiz-app-7ch0.onrender.com/api';
        const ADMIN_PASS = '0305';

        window.onload = function() {
            const role = localStorage.getItem('quiz_role');
            if (role === 'admin' || role === 'user') {
                showMain(role);
            } else {
                document.getElementById('roleScreen').style.display = 'flex';
            }
        }

        function enterAsUser() {
            localStorage.setItem('quiz_role', 'user');
            showMain('user');
        }

        function showPassBox() {
            document.getElementById('passBox').style.display = 'flex';
            setTimeout(function() { document.getElementById('adminPass').focus(); }, 100);
        }

        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASS) {
                localStorage.setItem('quiz_role', 'admin');
                showMain('admin');
            } else {
                document.getElementById('passError').style.display = 'block';
                document.getElementById('adminPass').value = '';
            }
        }

        function showMain(role) {
            document.getElementById('roleScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';

            const badge = document.getElementById('roleBadge');
            if (role === 'admin') {
                badge.textContent = '🔐 Admin';
                badge.className = 'role-badge badge-admin';
                document.getElementById('btnAddSubject').style.display = 'inline-block';
            } else {
                badge.textContent = '👤 User';
                badge.className = 'role-badge badge-user';
                document.getElementById('btnAddSubject').style.display = 'none';
            }
            badge.title = 'Bấm để đổi role';
            badge.onclick = switchRole;

            loadSubjects();
        }

        function switchRole() {
            if (confirm('Bạn muốn đổi role? Sẽ về màn hình chọn lại.')) {
                localStorage.removeItem('quiz_role');
                location.reload();
            }
        }

        async function loadSubjects() {
            const res = await fetch(API + '/subjects');
            const subjects = await res.json();
            const list = document.getElementById('subjectList');
            const empty = document.getElementById('emptyState');

            list.innerHTML = '';
            if (subjects.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            const colors = ['rgba(99,102,241,0.25)', 'rgba(14,165,233,0.25)', 'rgba(16,185,129,0.25)', 'rgba(167,139,250,0.25)', 'rgba(236,72,153,0.25)'];
            const borders = ['rgba(99,102,241,0.5)', 'rgba(14,165,233,0.5)', 'rgba(16,185,129,0.5)', 'rgba(167,139,250,0.5)', 'rgba(236,72,153,0.5)'];

            subjects.forEach(function(s, i) {
                const c = i % colors.length;
                const div = document.createElement('div');
                div.className = 'subject-card';
                div.style.borderColor = borders[c];
                div.innerHTML = '<h3>📘 ' + s.name + '</h3>';
                div.onclick = function() { goToSubject(s.id, s.name); };
                list.appendChild(div);
            });
        }

        async function addSubject() {
            const name = document.getElementById('subjectName').value.trim();
            if (!name) { alert('Vui lòng nhập tên môn học!'); return; }

            await fetch(API + '/subjects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });

            document.getElementById('subjectName').value = '';
            closeModal();
            loadSubjects();
        }

        function goToSubject(id, name) {
            localStorage.setItem('subjectId', id);
            localStorage.setItem('subjectName', name);
            window.location.href = 'subject.html';
        }

        function goToNoteQuiz() {
            const notedIds = JSON.parse(localStorage.getItem('noted_questions') || '[]');
            if (notedIds.length === 0) {
                alert('Bạn chưa note câu hỏi nào!');
                return;
            }
            window.location.href = 'note-quiz.html';
        }

        function openModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    </script>
</body>
</html>
