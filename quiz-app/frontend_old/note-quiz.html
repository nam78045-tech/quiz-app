<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Câu đã note</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .quiz-subject-label {
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .btn-note-sm {
            background: rgba(245,158,11,0.08);
            color: #94a3b8;
            border: 1px solid rgba(100,116,139,0.25);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-note-sm.noted {
            background: rgba(245,158,11,0.12);
            color: #fbbf24;
            border-color: rgba(245,158,11,0.35);
        }
        .btn-note-sm:hover { background: rgba(245,158,11,0.15); }

        .question-box {
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 24px 28px;
            border: 1px solid rgba(99,102,241,0.2);
            margin-bottom: 16px;
        }
        .question-counter {
            font-size: 12px;
            color: #475569;
        }
        .question-text {
            font-size: 1rem;
            color: #cbd5e1;
            line-height: 1.7;
            margin: 16px 0 18px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .option-btn {
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(30,41,59,0.9);
            border-radius: 10px;
            padding: 11px 16px;
            text-align: left;
            font-size: 0.92rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }
        .option-btn:hover:not(:disabled) {
            border-color: rgba(99,102,241,0.45);
            color: #a5b4fc;
            background: rgba(99,102,241,0.08);
        }
        .option-btn.correct {
            border-color: rgba(16,185,129,0.5);
            background: rgba(16,185,129,0.08);
            color: #34d399;
            font-weight: 600;
        }
        .option-btn.wrong {
            border-color: rgba(239,68,68,0.5);
            background: rgba(239,68,68,0.08);
            color: #f87171;
        }

        .next-bar {
            display: none;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .result-card {
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 48px 28px;
            border: 1px solid rgba(245,158,11,0.2);
            text-align: center;
        }
        .score-big {
            font-size: 3.8rem;
            font-weight: 700;
            color: #fbbf24;
            letter-spacing: -1px;
        }
        .score-desc {
            color: #64748b;
            margin-top: 10px;
            font-size: 1rem;
        }
        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top bar -->
        <div class="top-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <h1 style="font-size:1.3rem; margin:0">📌 Câu Đã Note</h1>
        </div>

        <!-- Progress -->
        <div class="progress-bar" style="margin-bottom:20px">
            <div class="progress-fill" id="progressFill" style="width:0%; background:#f59e0b"></div>
        </div>

        <!-- Quiz box -->
        <div id="quizBox">
            <div class="question-box" style="border-color: rgba(245,158,11,0.2)">
                <div class="quiz-meta">
                    <span class="question-counter" id="questionCounter"></span>
                    <button class="btn-note-sm noted" id="noteBtn" onclick="toggleNote()">📌 Note</button>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsBox"></div>
            </div>
        </div>

        <!-- Next button -->
        <div id="nextBox" class="next-bar">
            <button class="btn btn-primary" onclick="nextQuestion()">Tiếp theo ➡</button>
        </div>

        <!-- Result box -->
        <div id="resultBox" style="display:none">
            <div class="result-card">
                <div class="score-big" id="scoreText"></div>
                <p class="score-desc" id="scoreDesc"></p>
                <div class="result-actions" id="resultBtns"></div>
            </div>
        </div>
    </div>
<script src="app.js"></script>

    <script>
        const API = window.location.hostname === 'localhost'
            ? 'http://localhost:8080/api'
            : 'https://quiz-app-7ch0.onrender.com/api';

        let questions = [];
        let current = 0;
        let score = 0;
        let answered = false;
        let shuffledOptions = [];
        let wrongQuestions = [];
        let isRetryMode = false;
        let notedIds = JSON.parse(localStorage.getItem('noted_questions') || '[]');

        async function loadNoteQuestions() {
            if (notedIds.length === 0) {
                document.getElementById('quizBox').innerHTML =
                    '<div class="empty-state">' +
                    '<div class="icon">📭</div>' +
                    '<p>Chưa có câu nào được note!</p>' +
                    '<br><button class="btn btn-primary" onclick="window.location.href=\'index.html\'">Quay về</button>' +
                    '</div>';
                return;
            }

            const subjectsRes = await fetch(API + '/subjects');
            const subjects = await subjectsRes.json();

            let allQuestions = [];
            for (const s of subjects) {
                const res = await fetch(API + '/questions/' + s.id);
                const qs = await res.json();
                allQuestions = allQuestions.concat(qs);
            }

            questions = allQuestions.filter(function(q) {
                return notedIds.includes(q.id);
            });

            if (questions.length === 0) {
                document.getElementById('quizBox').innerHTML =
                    '<div class="empty-state">' +
                    '<div class="icon">📭</div>' +
                    '<p>Không tìm thấy câu đã note!</p>' +
                    '<br><button class="btn btn-primary" onclick="window.location.href=\'index.html\'">Quay về</button>' +
                    '</div>';
                return;
            }

            questions = questions.sort(function() { return Math.random() - 0.5; });
            showQuestion();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
            }
            return arr;
        }

        function showQuestion() {
            answered = false;
            const q = questions[current];
            const total = questions.length;

            document.getElementById('questionCounter').textContent =
                'Câu ' + (current + 1) + ' / ' + total;
            document.getElementById('questionText').textContent = q.questionText;
            document.getElementById('progressFill').style.width =
                ((current / total) * 100) + '%';

            document.getElementById('nextBox').style.display = 'none';

            // Note button state
            var noteBtn = document.getElementById('noteBtn');
            noteBtn.className = 'btn-note-sm' + (notedIds.includes(q.id) ? ' noted' : '');

            var options = [
                { key: 'A', text: q.optionA },
                { key: 'B', text: q.optionB },
                { key: 'C', text: q.optionC },
                { key: 'D', text: q.optionD }
            ];
            shuffledOptions = shuffleArray(options);

            const labels = ['A', 'B', 'C', 'D'];
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';

            shuffledOptions.forEach(function(opt, index) {
                const isCorrectOriginal = (opt.key === q.correctAnswer);
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = '<strong>' + labels[index] + ')</strong> ' + opt.text;
                btn.addEventListener('click', function() {
                    selectAnswer(isCorrectOriginal, btn);
                });
                optionsBox.appendChild(btn);
            });
        }

        function toggleNote() {
            const q = questions[current];
            const noteBtn = document.getElementById('noteBtn');
            const idx = notedIds.indexOf(q.id);
            if (idx === -1) {
                notedIds.push(q.id);
                noteBtn.className = 'btn-note-sm noted';
            } else {
                notedIds.splice(idx, 1);
                noteBtn.className = 'btn-note-sm';
            }
            localStorage.setItem('noted_questions', JSON.stringify(notedIds));
        }

        function selectAnswer(isCorrect, clickedBtn) {
            if (answered) return;
            answered = true;

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(function(b) { b.disabled = true; });

            shuffledOptions.forEach(function(opt, index) {
                if (opt.key === questions[current].correctAnswer) {
                    allBtns[index].classList.add('correct');
                }
            });

            if (isCorrect) {
                score++;
            } else {
                clickedBtn.classList.add('wrong');
                wrongQuestions.push(questions[current]);
            }

            document.getElementById('nextBox').style.display = 'flex';
        }

        function nextQuestion() {
            current++;
            if (current >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showResult() {
            document.getElementById('quizBox').style.display = 'none';
            document.getElementById('nextBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';

            const total = questions.length;
            const percent = Math.round((score / total) * 100);

            document.getElementById('scoreText').textContent = score + ' / ' + total;
            document.getElementById('scoreDesc').textContent =
                percent >= 80 ? '🎉 Xuất sắc! Bạn đạt ' + percent + '%' :
                percent >= 60 ? '👍 Khá tốt! Bạn đạt ' + percent + '%' :
                '💪 Cố gắng hơn nhé! Bạn đạt ' + percent + '%';

            var btns = document.getElementById('resultBtns');
            btns.innerHTML = '';

            if (!isRetryMode && wrongQuestions.length > 0) {
                var retryBtn = document.createElement('button');
                retryBtn.className = 'btn btn-warning';
                retryBtn.textContent = '❌ Làm lại ' + wrongQuestions.length + ' câu sai';
                retryBtn.addEventListener('click', startRetry);
                btns.appendChild(retryBtn);
            }

            var restartBtn = document.createElement('button');
            restartBtn.className = 'btn btn-primary';
            restartBtn.textContent = '🔄 Làm lại từ đầu';
            restartBtn.addEventListener('click', restartQuiz);
            btns.appendChild(restartBtn);

            var backBtn = document.createElement('button');
            backBtn.className = 'btn btn-secondary';
            backBtn.textContent = '🔙 Quay về';
            backBtn.addEventListener('click', function() {
                window.location.href = 'index.html';
            });
            btns.appendChild(backBtn);
        }

        function startRetry() {
            isRetryMode = true;
            questions = wrongQuestions.sort(function() { return Math.random() - 0.5; });
            wrongQuestions = [];
            current = 0; score = 0;
            document.getElementById('quizBox').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            showQuestion();
        }

        function restartQuiz() {
            isRetryMode = false;
            wrongQuestions = [];
            current = 0; score = 0;
            document.getElementById('quizBox').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            questions = questions.sort(function() { return Math.random() - 0.5; });
            showQuestion();
        }

        loadNoteQuestions();
    </script>
</body>
</html>
